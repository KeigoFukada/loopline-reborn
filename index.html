<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>LoopLine Reborn (Recovery)</title>
  <style>
    :root{
      --bg:#0b0b0f;
      --panel:#171a24;
      --ink:#f4f6fb;
      --muted:#a9adbb;
      --line:#d9dbe5;
      --good:#7cff7c;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0; height:100%;
      background:var(--bg); color:var(--ink);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans JP",sans-serif;
    }
    .wrap{max-width:940px; margin:0 auto; padding:10px;}
    .top{
      background:var(--panel);
      border-radius:16px;
      padding:10px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      justify-content:space-between;
    }
    .row{display:flex; flex-wrap:wrap; gap:8px; align-items:center;}
    button{
      appearance:none; border:none; cursor:pointer;
      background:rgba(255,255,255,.08); color:var(--ink);
      border:1px solid rgba(255,255,255,.14);
      padding:10px 12px; border-radius:12px; font-weight:800;
      font-size:13px;
    }
    button:active{transform:translateY(1px)}
    .primary{
      background:rgba(124,255,124,.12);
      border-color:rgba(124,255,124,.28);
    }
    .pill{
      display:inline-flex; gap:8px; align-items:center;
      padding:7px 10px; border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.04);
      font-size:12px; font-weight:800;
    }
    .stats{
      margin-top:10px; color:var(--muted);
      display:flex; gap:12px; flex-wrap:wrap; font-weight:800;
    }
    .hint{
      margin-top:6px; color:var(--muted);
      font-size:12px; line-height:1.45;
    }
    .stage{
      margin-top:10px; background:var(--panel);
      border-radius:16px; padding:10px;
    }
    canvas{
      width:100%; display:block; border-radius:14px;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      touch-action:none;
    }
    #clear{color:var(--good); font-weight:1000;}
    @media (max-width:520px){
      .top{flex-direction:column; align-items:stretch}
      button{padding:9px 10px; font-size:12px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="row">
        <button id="btnEndless" class="primary">エンドレス開始</button>
        <button id="btnNew">新しい盤面</button>
        <button id="btnRetry">リトライ</button>
        <button id="btnNext">次へ</button>
      </div>
      <div class="row">
        <label class="pill"><input type="checkbox" id="togHint"> HINT</label>
        <span id="clear"></span>
      </div>
    </div>

    <div class="stats">
      <div>MODE: <span id="modeLabel">LEVEL</span></div>
      <div>LEVEL <span id="levelLabel">1</span></div>
      <div>Time <span id="timeLabel">00:00.0</span></div>
      <div>Actions <span id="actLabel">0</span></div>
    </div>

    <div class="hint">
      点をタップして線をつなぎ、すべての点を一度ずつ踏んで、最後にスタート地点へ戻るとCLEAR。
    </div>

    <div class="stage">
      <canvas id="cv" width="900" height="900"></canvas>
    </div>
  </div>

  <script>
    (() => {
      const $ = (id) => document.getElementById(id);
      const cv = $("cv");
      const ctx = cv.getContext("2d");

      const UI = {
        mode: $("modeLabel"),
        level: $("levelLabel"),
        time: $("timeLabel"),
        act: $("actLabel"),
        clear: $("clear")
      };

      const levels = [
        { r: 2, c: 4 },
        { r: 3, c: 4 },
        { r: 4, c: 4 },
        { r: 3, c: 6 },
        { r: 4, c: 6 },
        { r: 5, c: 6 }
      ];

      let mode = "LEVEL";
      let levelIdx = 0;
      let rows = 2, cols = 4;
      let nodes = [];      // {id,r,c,x,y,visited}
      let startId = -1;
      let lastId = -1;
      let path = [];       // node ids
      let segments = [];   // [a,b]
      let actions = 0;
      let startedAt = null;
      let timer = null;
      let dragging = false;

      function resizeCanvas() {
        const rect = cv.getBoundingClientRect();
        const dpr = Math.min(2, window.devicePixelRatio || 1);
        const w = Math.max(320, Math.floor(rect.width * dpr));
        if (cv.width !== w || cv.height !== w) {
          cv.width = w;
          cv.height = w;
        }
      }

      function fmtTime(ms) {
        const t = Math.max(0, ms | 0);
        const s = t / 1000;
        const m = Math.floor(s / 60);
        const rs = s - m * 60;
        return `${String(m).padStart(2,"0")}:${String(Math.floor(rs)).padStart(2,"0")}.${Math.floor((rs % 1) * 10)}`;
      }

      function startTimer() {
        if (startedAt) return;
        startedAt = Date.now();
        timer = setInterval(() => {
          UI.time.textContent = fmtTime(Date.now() - startedAt);
        }, 100);
      }

      function stopTimer() {
        if (timer) clearInterval(timer);
        timer = null;
      }

      function resetStats() {
        stopTimer();
        startedAt = null;
        actions = 0;
        UI.time.textContent = "00:00.0";
        UI.act.textContent = "0";
        UI.clear.textContent = "";
      }

      function buildLevel(r, c) {
        rows = r; cols = c;
        nodes = [];
        path = [];
        segments = [];
        startId = -1;
        lastId = -1;
        resetStats();

        let id = 0;
        for (let rr = 0; rr < rows; rr++) {
          for (let cc = 0; cc < cols; cc++) {
            nodes.push({ id: id++, r: rr, c: cc, x: 0, y: 0, visited: false });
          }
        }
        draw();
      }

      function updateNodePixels() {
        resizeCanvas();
        const pad = Math.round(cv.width * 0.12);
        const usable = cv.width - pad * 2;
        const stepX = cols > 1 ? usable / (cols - 1) : usable;
        const stepY = rows > 1 ? usable / (rows - 1) : usable;
        const step = Math.min(stepX, stepY);
        const ox = (cv.width - (cols - 1) * step) / 2;
        const oy = (cv.height - (rows - 1) * step) / 2;

        for (const n of nodes) {
          n.x = ox + n.c * step;
          n.y = oy + n.r * step;
        }
        return { step };
      }

      function adjacent(a, b) {
        const A = nodes[a], B = nodes[b];
        return Math.abs(A.r - B.r) + Math.abs(A.c - B.c) === 1;
      }

      function nearestNode(px, py) {
        let best = null, bestD = Infinity;
        for (const n of nodes) {
          const dx = px - n.x, dy = py - n.y;
          const d = dx*dx + dy*dy;
          if (d < bestD) { bestD = d; best = n; }
        }
        return { node: best, dist2: bestD };
      }

      function visitedCount() {
        let count = 0;
        for (const n of nodes) if (n.visited) count++;
        return count;
      }

      function setActionCount(v) {
        actions = v;
        UI.act.textContent = String(actions);
      }

      function errorFlash() {
        UI.clear.textContent = "×";
        setTimeout(() => {
          if (UI.clear.textContent === "×") UI.clear.textContent = "";
        }, 180);
      }

      function tryStep(target) {
        if (!target) return;
        if (UI.clear.textContent === "CLEAR!") return;

        // 1手目 = スタート決定
        if (startId < 0) {
          startId = target.id;
          lastId = target.id;
          target.visited = true;
          path = [target.id];
          setActionCount(actions + 1);
          draw();
          return;
        }

        // 一つ前に戻る = UNDO的挙動
        if (path.length >= 2 && target.id === path[path.length - 2]) {
          const removed = path.pop();
          nodes[removed].visited = false;
          segments.pop();
          lastId = path[path.length - 1];
          setActionCount(actions + 1);
          draw();
          return;
        }

        const total = rows * cols;

        // 最後にスタートへ戻ってクリア
        if (
          target.id === startId &&
          path.length >= 4 &&
          adjacent(lastId, startId) &&
          visitedCount() === total
        ) {
          segments.push([lastId, startId]);
          setActionCount(actions + 1);
          stopTimer();
          UI.clear.textContent = "CLEAR!";
          draw();
          if (mode === "LEVEL") setTimeout(nextLevel, 700);
          return;
        }

        // 不正手
        if (target.visited) { errorFlash(); return; }
        if (!adjacent(lastId, target.id)) { errorFlash(); return; }

        // 通常手
        if (path.length === 1) startTimer();
        segments.push([lastId, target.id]);
        target.visited = true;
        path.push(target.id);
        lastId = target.id;
        setActionCount(actions + 1);
        draw();
      }

      function nextLevel() {
        levelIdx = (levelIdx + 1) % levels.length;
        UI.level.textContent = String(levelIdx + 1);
        const lv = levels[levelIdx];
        buildLevel(lv.r, lv.c);
      }

      function retryLevel() {
        const lv = levels[levelIdx];
        buildLevel(lv.r, lv.c);
      }

      function newBoard() {
        // 今回はシンプルに同じレベル再生成（見た目は同じ構成）
        retryLevel();
      }

      function getHintCandidates() {
        if (!$("togHint").checked) return [];
        if (startId < 0 || UI.clear.textContent === "CLEAR!") return [];
        const cands = [];
        for (const n of nodes) {
          if (n.visited) continue;
          if (adjacent(lastId, n.id)) cands.push(n);
        }
        return cands;
      }

      function draw() {
        if (!nodes.length) return;
        const { step } = updateNodePixels();
        ctx.clearRect(0, 0, cv.width, cv.height);

        // パス
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.lineWidth = Math.max(6, step * 0.10);
        ctx.strokeStyle = "rgba(217,219,229,.95)";
        for (const [a, b] of segments) {
          const A = nodes[a], B = nodes[b];
          ctx.beginPath();
          ctx.moveTo(A.x, A.y);
          ctx.lineTo(B.x, B.y);
          ctx.stroke();
        }

        // HINT
        const hints = getHintCandidates();
        if (hints.length) {
          ctx.globalAlpha = 0.20;
          ctx.fillStyle = "#ffffff";
          for (const n of hints) {
            ctx.beginPath();
            ctx.arc(n.x, n.y, Math.max(18, step * 0.18), 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalAlpha = 1;
        }

        // 点
        const r = Math.max(10, step * 0.14);
        for (const n of nodes) {
          ctx.beginPath();
          ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
          ctx.fillStyle = n.visited ? "rgba(255,255,255,.95)" : "rgba(255,255,255,.28)";
          ctx.fill();

          if (n.id === startId) {
            ctx.lineWidth = Math.max(3, step * 0.06);
            ctx.strokeStyle = "rgba(124,255,124,.9)";
            ctx.stroke();
          }
        }
      }

      // 入力（タップ/ドラッグ）
      cv.addEventListener("pointerdown", (e) => {
        dragging = true;
        try { cv.setPointerCapture(e.pointerId); } catch {}
        const rect = cv.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (cv.width / rect.width);
        const y = (e.clientY - rect.top) * (cv.height / rect.height);
        const { step } = updateNodePixels();
        const { node, dist2 } = nearestNode(x, y);
        const r = Math.max(14, step * 0.18);
        if (node && dist2 <= (r * r * 5)) tryStep(node);
      }, { passive: true });

      cv.addEventListener("pointermove", (e) => {
        if (!dragging) return;
        const rect = cv.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (cv.width / rect.width);
        const y = (e.clientY - rect.top) * (cv.height / rect.height);
        const { step } = updateNodePixels();
        const { node, dist2 } = nearestNode(x, y);
        const r = Math.max(14, step * 0.18);
        if (node && dist2 <= (r * r * 3.5)) tryStep(node);
      }, { passive: true });

      cv.addEventListener("pointerup", (e) => {
        dragging = false;
        try { cv.releasePointerCapture(e.pointerId); } catch {}
      }, { passive: true });

      // ボタン
      $("btnRetry").addEventListener("click", retryLevel);
      $("btnNew").addEventListener("click", newBoard);
      $("btnNext").addEventListener("click", nextLevel);
      $("btnEndless").addEventListener("click", () => {
        mode = "ENDLESS";
        UI.mode.textContent = "ENDLESS";
        levelIdx = 0;
        UI.level.textContent = "1";
        const lv = levels[levelIdx];
        buildLevel(lv.r, lv.c);
      });

      // 初期化
      window.addEventListener("resize", () => { resizeCanvas(); draw(); });
      resizeCanvas();
      UI.mode.textContent = "LEVEL";
      UI.level.textContent = "1";
      buildLevel(levels[0].r, levels[0].c);
    })();
  </script>
</body>
</html>
